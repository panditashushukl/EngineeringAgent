services:
  - type: web
    name: engineering-agent-web
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: engineering-agent-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: engineering-agent-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: engineering-agent-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: engineering-agent-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: engineering-agent-db
          property: password
      - key: CACHE_STORE
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: REDIS_URL
        fromService:
          type: redis
          name: engineering-agent-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: CONTAINER_ROLE
        value: app

  - type: worker
    name: engineering-agent-worker
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        fromService:
          type: web
          name: engineering-agent-web
          property: envVar:APP_KEY
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: engineering-agent-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: engineering-agent-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: engineering-agent-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: engineering-agent-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: engineering-agent-db
          property: password
      - key: CACHE_STORE
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: REDIS_URL
        fromService:
          type: redis
          name: engineering-agent-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: CONTAINER_ROLE
        value: queue

  - type: redis
    name: engineering-agent-redis
    plan: free
    ipAllowList: []

databases:
  - name: engineering-agent-db
    plan: free
